<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Neuradix Atlas app icon">
  <!--
    Neuradix Atlas — app icon
    Concept: an "A" monogram (Atlas) standing inside a world ring (globe / atlas),
    the apex reading as a compass point that guides the business owner.
    Exactly three colours:
      • Indigo  #4F46E5  (brand, background)
      • Cyan    #22D3EE  (accent, the world ring)
      • White   #FFFFFF  (the monogram)
  -->
  <rect width="1024" height="1024" rx="224" fill="#4F46E5"/>

  <!-- World ring (atlas / globe) -->
  <circle cx="512" cy="512" r="296" fill="none" stroke="#22D3EE" stroke-width="40"/>

  <!-- "A" monogram -->
  <g fill="none" stroke="#FFFFFF" stroke-linejoin="round" stroke-linecap="round">
    <path d="M368 712 L512 312 L656 712" stroke-width="80"/>
    <path d="M424 556 L600 556" stroke-width="72"/>
  </g>
</svg>
