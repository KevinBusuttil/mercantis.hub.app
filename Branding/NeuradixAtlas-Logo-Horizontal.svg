<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200" role="img" aria-label="Neuradix Atlas">
  <!--
    Neuradix Atlas — horizontal logo lockup (mark + wordmark).
    Three colours: Indigo #4F46E5, Cyan #22D3EE, White #FFFFFF.
    NOTE: the wordmark uses a system sans stack; outline the text to paths
    before shipping so it renders identically everywhere.
  -->

  <!-- Mark: the app-icon artwork scaled to 168×168 -->
  <g transform="translate(16,16) scale(0.1640625)">
    <rect width="1024" height="1024" rx="224" fill="#4F46E5"/>
    <circle cx="512" cy="512" r="296" fill="none" stroke="#22D3EE" stroke-width="40"/>
    <g fill="none" stroke="#FFFFFF" stroke-linejoin="round" stroke-linecap="round">
      <path d="M368 712 L512 312 L656 712" stroke-width="80"/>
      <path d="M424 556 L600 556" stroke-width="72"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="212" y="124" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="74" letter-spacing="-1.5" fill="#4F46E5">
    <tspan font-weight="700">Neuradix</tspan><tspan font-weight="400"> Atlas</tspan>
  </text>
</svg>
